<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1015">
<title>Molo-Molo Fitness</title>
<meta name="description" content="Molo-Molo Fitness — Gestion complète de salle de sport">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d1015'/%3E%3Cpath d='M15 55 L30 55 L38 30 L48 75 L58 45 L65 55 L85 55' stroke='%23ff5734' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --bg:#0b0d12; --bg2:#12151c; --elev:#181c26; --elev2:#1f2430;
  --border:#262c3a; --text:#eef0f4; --dim:#8b93a6; --dim2:#5c6479;
  --accent:#ff5734; --accent-d:#e2431f; --accent-soft:#3a2119;
  --teal:#22d3b8; --teal-soft:#0f2b27;
  --warn:#f5a524; --warn-soft:#332510;
  --danger:#ef4444; --danger-soft:#331414;
  --gold:#f2c94c;
  --radius:14px;
  font-size:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; overscroll-behavior:none;
  padding-bottom:76px; min-height:100vh;
}
.hdr-font{font-family:'Arial Narrow',Arial,sans-serif; font-weight:800; letter-spacing:.02em; text-transform:uppercase;}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}
a{color:inherit;}

/* ---------- top bar ---------- */
#topbar{
  position:sticky; top:0; z-index:40; background:linear-gradient(180deg,var(--bg2),rgba(11,13,18,.92));
  backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
  padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
#brand{display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;}
#brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-d)); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
#brand .mark svg{width:20px;height:20px;}
#brand .name{font-size:16px;}
#brand .name small{display:block; font-size:10px; color:var(--dim); letter-spacing:.12em; font-weight:600; text-transform:uppercase; margin-top:1px;}
#pulseWrap{flex:1; height:26px; overflow:hidden; margin:0 6px; opacity:.55;}
#topActions{display:flex; align-items:center; gap:8px;}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--elev);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);position:relative;}
.iconbtn svg{width:18px;height:18px;}
.badge-dot{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2);}

/* ---------- layout ---------- */
main{padding:14px 14px 24px; max-width:720px; margin:0 auto;}
.view{display:none; animation:fade .18s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.section-title{display:flex; align-items:center; justify-content:space-between; margin:22px 0 10px;}
.section-title h2{font-size:13px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); font-weight:800;}
.section-title .link{font-size:12px; color:var(--accent); font-weight:700;}

.card{background:var(--elev); border:1px solid var(--border); border-radius:var(--radius); padding:14px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}

.stat-card{background:var(--elev); border:1px solid var(--border); border-radius:var(--radius); padding:14px; position:relative; overflow:hidden;}
.stat-card .v{font-size:24px; font-weight:800; font-family:'Arial Narrow',Arial,sans-serif;}
.stat-card .l{font-size:11px; color:var(--dim); margin-top:2px; font-weight:600;}
.stat-card .trend{position:absolute; top:12px; right:12px; font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px;}
.trend.up{color:var(--teal); background:var(--teal-soft);}
.trend.down{color:var(--danger); background:var(--danger-soft);}

.alert-row{display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border-radius:12px; border:1px solid var(--border); background:var(--elev); margin-bottom:8px;}
.alert-row .dot{width:8px;height:8px;border-radius:50%; margin-top:5px; flex-shrink:0;}
.alert-row .t{font-size:13.5px; font-weight:700;}
.alert-row .s{font-size:11.5px; color:var(--dim); margin-top:2px;}
.dot.red{background:var(--danger);} .dot.amber{background:var(--warn);} .dot.teal{background:var(--teal);} .dot.grey{background:var(--dim2);}

.list-item{display:flex; align-items:center; gap:11px; padding:12px; border:1px solid var(--border); border-radius:12px; background:var(--elev); margin-bottom:8px;}
.avatar{width:42px;height:42px;border-radius:11px; background:var(--elev2); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:var(--accent); flex-shrink:0; border:1px solid var(--border);}
.li-body{flex:1; min-width:0;}
.li-title{font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.li-sub{font-size:12px; color:var(--dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.li-right{text-align:right; flex-shrink:0;}
.pill{display:inline-block; font-size:10px; font-weight:800; padding:3px 8px; border-radius:100px; text-transform:uppercase; letter-spacing:.04em;}
.pill.ok{background:var(--teal-soft); color:var(--teal);}
.pill.warn{background:var(--warn-soft); color:var(--warn);}
.pill.bad{background:var(--danger-soft); color:var(--danger);}
.pill.muted{background:var(--elev2); color:var(--dim);}

.searchbar{display:flex; align-items:center; gap:8px; background:var(--elev); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:12px;}
.searchbar svg{width:16px;height:16px; color:var(--dim); flex-shrink:0;}
.searchbar input{flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px;}

.tabs-scroll{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:12px;}
.chip{flex-shrink:0; padding:8px 13px; border-radius:100px; background:var(--elev); border:1px solid var(--border); font-size:12.5px; font-weight:700; color:var(--dim);}
.chip.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent-d);}

.fab{position:fixed; right:18px; bottom:92px; width:54px; height:54px; border-radius:50%; background:var(--accent); color:#fff; border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(255,87,52,.35); z-index:35;}
.fab svg{width:24px;height:24px;}

/* bottom nav */
#bottomnav{position:fixed; bottom:0; left:0; right:0; z-index:40; background:rgba(18,21,28,.96); backdrop-filter:blur(10px); border-top:1px solid var(--border); display:flex; padding:6px 2px calc(6px + env(safe-area-inset-bottom));}
.navbtn{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:var(--dim2); position:relative; background:none; border:none;}
.navbtn svg{width:20px;height:20px;}
.navbtn span{font-size:9.5px; font-weight:700;}
.navbtn.active{color:var(--accent);}
.navbtn .lock{position:absolute; top:2px; right:calc(50% - 20px); width:13px;height:13px;background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center;}
.navbtn .lock svg{width:8px;height:8px; color:#3a2b00;}
#moreSheetTrigger.active{color:var(--accent);}

/* modal / sheet */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:60; display:none; align-items:flex-end;}
.overlay.show{display:flex;}
.sheet{background:var(--bg2); width:100%; max-height:90vh; overflow-y:auto; border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; padding:16px 16px calc(20px + env(safe-area-inset-bottom));}
.sheet-handle{width:36px;height:4px;background:var(--dim2); border-radius:3px; margin:0 auto 14px;}
.sheet h3{font-size:17px; font-weight:800; margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block; font-size:11.5px; font-weight:700; color:var(--dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em;}
.field input,.field select,.field textarea{
  width:100%; background:var(--elev); border:1px solid var(--border); border-radius:10px; padding:11px 12px; color:var(--text); font-size:14.5px; outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical; min-height:64px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.btn{display:flex; align-items:center; justify-content:center; gap:7px; padding:13px 16px; border-radius:12px; font-size:14.5px; font-weight:800; border:none; width:100%;}
.btn-primary{background:var(--accent); color:#fff;}
.btn-ghost{background:var(--elev); color:var(--text); border:1px solid var(--border);}
.btn-danger{background:var(--danger-soft); color:var(--danger);}
.btn-row{display:flex; gap:10px; margin-top:16px;}
.btn-sm{padding:8px 12px; font-size:12.5px; border-radius:9px; width:auto;}

.empty{text-align:center; padding:42px 14px; color:var(--dim);}
.empty svg{width:38px;height:38px; color:var(--dim2); margin-bottom:10px;}
.empty p{font-size:13px;}

.lockcard{text-align:center; padding:34px 20px;}
.lockcard .g{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#c9932a); display:flex;align-items:center;justify-content:center; margin:0 auto 14px;}
.lockcard .g svg{width:26px;height:26px; color:#3a2b00;}
.lockcard h3{font-size:16px; margin-bottom:6px;}
.lockcard p{font-size:13px; color:var(--dim); margin-bottom:16px; line-height:1.5;}

/* PIN screen */
#pinScreen{position:fixed; inset:0; background:radial-gradient(circle at 50% 25%, var(--elev2) 0%, var(--bg2) 45%, var(--bg) 100%); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;}
#pinScreen.show{display:flex;}
.pin-dots{display:flex; gap:14px; margin:22px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%; border:2px solid var(--dim2);}
.pin-dot.filled{background:var(--accent); border-color:var(--accent);}
.pin-pad{display:grid; grid-template-columns:repeat(3,68px); gap:14px;}
.pin-key{width:68px;height:68px;border-radius:50%; background:var(--elev); border:1px solid var(--border); color:var(--text); font-size:22px; font-weight:700;}
.pin-key:active{background:var(--elev2);}

/* toast */
#toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--elev2); border:1px solid var(--border); padding:12px 18px; border-radius:12px; font-size:13px; font-weight:700; z-index:90; opacity:0; transition:.25s; pointer-events:none; max-width:88vw; text-align:center;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

canvas{width:100%; display:block;}

.progress-bar{height:7px; background:var(--elev2); border-radius:6px; overflow:hidden;}
.progress-bar > div{height:100%; background:var(--accent); border-radius:6px;}

.small{font-size:12px; color:var(--dim);}
.mt{margin-top:10px;} .mt2{margin-top:16px;}
.tag{display:inline-block; padding:3px 8px; background:var(--elev2); border-radius:7px; font-size:11px; color:var(--dim); margin:2px 4px 0 0;}

footer.copyright{text-align:center; padding:26px 10px 6px; font-size:10.5px; color:var(--dim2); line-height:1.6;}

@media(min-width:540px){ .grid3{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>

<!-- ================= PIN SCREEN ================= -->
<div id="pinScreen">
  <div class="mark" style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent-d));display:flex;align-items:center;justify-content:center;">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" style="width:28px;height:28px;"><path d="M3 12h4l2-6 4 12 2-6h6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h2 class="hdr-font" style="margin-top:16px; font-size:18px;">Molo-Molo Fitness</h2>
  <p class="small" id="pinLabel" style="margin-top:6px;">Entrez le code PIN</p>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-pad" id="pinPad"></div>
  <button class="btn-ghost btn btn-sm" id="pinForgot" style="margin-top:20px; width:auto; padding:9px 16px;">PIN oublié ?</button>
</div>

<!-- ================= TOP BAR ================= -->
<div id="topbar">
  <div id="brand">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M3 12h4l2-6 4 12 2-6h6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="name hdr-font">Molo-Molo<small>Fitness · Gestion de salle</small></div>
  </div>
  <div id="pulseWrap"><canvas id="pulseCanvas" height="26"></canvas></div>
  <div id="topActions">
    <button class="iconbtn" id="btnNotif"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="badge-dot" id="notifCount" style="display:none;">0</span></button>
    <button class="iconbtn" id="btnSearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
  </div>
</div>

<main id="main"></main>

<button class="fab" id="fabAdd" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></button>

<!-- ================= BOTTOM NAV ================= -->
<div id="bottomnav"></div>

<div id="toast"></div>

<!-- generic sheet -->
<div class="overlay" id="sheetOverlay"><div class="sheet" id="sheetContent"></div></div>

<script>
(function(){
"use strict";

/* ============================================================
   MOLO-MOLO FITNESS
   Ouedraogo Namketa Omar Bertrand © 2026
   Application mono-fichier — vanilla JS — offline-first
   ============================================================ */

const APP_KEY = "mmf_state_v1";
const DATA_VERSION = 1;
const uid = (p)=> p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO = ()=> new Date().toISOString().slice(0,10);
const nowTS = ()=> Date.now();
const fmtFCFA = (n)=> (Math.round(n||0)).toLocaleString('fr-FR').replace(/,/g,' ') + " FCFA";
const fmtDate = (iso)=>{ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return iso; return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); };
const daysBetween = (a,b)=> Math.round((new Date(b)-new Date(a))/86400000);
const initials = (s)=> (s||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------------- default data model ---------------- */
function defaultState(){
  return {
    _v: DATA_VERSION,
    settings:{ salle:"Molo-Molo Fitness", pin:"", pinEnabled:false, lastOpenTS: nowTS(), _clockRef: nowTS() },
    license:{ status:"free", activatedAt:null, expiresAt:null, plan:null, deviceCode: uid("DEV").toUpperCase(), pendingSmsCode:null, pendingSmsExpires:null },
    members:[], coachs:[], programmes:[], equipements:[], paiements:[], nutrition:[], planning:[],
    seeded:false
  };
}
const DEFAULTS = defaultState();

function deepMergeDefaults(target, def){
  if(typeof def !== "object" || def===null || Array.isArray(def)) return (target===undefined? def : target);
  target = (typeof target==="object" && target!==null && !Array.isArray(target)) ? target : {};
  for(const k in def){ target[k] = deepMergeDefaults(target[k], def[k]); }
  return target;
}

let STATE = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(APP_KEY);
    let s = raw ? JSON.parse(raw) : defaultState();
    s = deepMergeDefaults(s, defaultState());
    // migrations by version could go here
    s._v = DATA_VERSION;
    return s;
  }catch(e){ return defaultState(); }
}
function saveState(){
  try{ localStorage.setItem(APP_KEY, JSON.stringify(STATE)); }catch(e){ toast("Erreur de sauvegarde locale"); }
}

/* ---------------- anti-rollback clock guard ---------------- */
function clockGuardOK(){
  const ref = STATE.settings._clockRef || 0;
  const now = nowTS();
  if(now < ref - 60000){ return false; }
  STATE.settings._clockRef = Math.max(ref, now);
  return true;
}

/* ---------------- seed demo minimal (only first run) ---------------- */
function seedIfEmpty(){
  if(STATE.seeded) return;
  STATE.coachs.push(
    {id:uid("co"), nom:"Traoré", prenom:"Aminata", telephone:"70 11 22 33", specialites:["Musculation","Perte de poids"], disponibilites:"Lun-Sam 7h-19h", remuneration:150000, certifications:"CQP Coach Sportif", evaluations:[4.8], clients:[], presence:[]},
    {id:uid("co"), nom:"Ouédraogo", prenom:"Issa", telephone:"76 22 33 44", specialites:["Cross Training","Cardio"], disponibilites:"Mar-Dim 6h-18h", remuneration:140000, certifications:"Certif. CrossTraining", evaluations:[4.6], clients:[], presence:[]}
  );
  STATE.members.push(
    {id:uid("me"), nom:"Kaboré", prenom:"Fatimata", telephone:"78 33 44 55", dateInscription:todayISO(), abonnementType:"Mensuel", abonnementDebut:todayISO(), abonnementFin:addDays(todayISO(),20), objectif:"Perte de poids", niveau:"Débutant", poids:68, taille:165, coachId:null, presence:[todayISO()], statut:"actif", fidelite:12},
    {id:uid("me"), nom:"Sawadogo", prenom:"Boureima", telephone:"70 44 55 66", dateInscription:addDays(todayISO(),-40), abonnementType:"Trimestriel", abonnementDebut:addDays(todayISO(),-40), abonnementFin:addDays(todayISO(),-2), objectif:"Prise de masse", niveau:"Intermédiaire", poids:74, taille:178, coachId:null, presence:[], statut:"actif", fidelite:30}
  );
  STATE.equipements.push(
    {id:uid("eq"), nom:"Tapis de course #1", categorie:"Cardio", etat:"Bon", dateAchat:addDays(todayISO(),-300), cout:850000, fournisseur:"SportEquip BF", garantieFin:addDays(todayISO(),65), localisation:"Salle Cardio", derniereMaintenance:addDays(todayISO(),-90), maintenanceLog:[]}
  );
  STATE.seeded = true;
  saveState();
}
function addDays(iso,n){ const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

/* ============================================================
   NAVIGATION / MODULES CONFIG
   ============================================================ */
const NAV = [
  {key:"dashboard", label:"Accueil", icon:icoHome, free:true},
  {key:"members",   label:"Adhérents", icon:icoUsers, free:false},
  {key:"coachs",    label:"Coachs", icon:icoWhistle, free:false},
  {key:"planning",  label:"Planning", icon:icoCal, free:false},
  {key:"more",      label:"Plus", icon:icoMore, free:true}
];
const MORE_ITEMS = [
  {key:"programmes", label:"Programmes", icon:icoDumbbell, free:true, freeLimit:6},
  {key:"nutrition",  label:"Nutrition", icon:icoLeaf, free:false},
  {key:"equipements",label:"Équipements", icon:icoWrench, free:true, freeLimit:10},
  {key:"paiements",  label:"Paiements & Caisse", icon:icoCash, free:true},
  {key:"stats",      label:"Statistiques", icon:icoChart, free:false},
  {key:"rapports",   label:"Rapports", icon:icoDoc, free:false},
  {key:"parametres", label:"Paramètres & Sécurité", icon:icoGear, free:true},
];

let CURRENT_VIEW = "dashboard";

function isPremium(){
  const lic = STATE.license;
  if(lic.status!=="premium") return false;
  if(lic.expiresAt===null) return true; // permanent
  return nowTS() < lic.expiresAt;
}
function moduleLocked(key){
  const item = NAV.find(n=>n.key===key) || MORE_ITEMS.find(n=>n.key===key);
  if(!item) return false;
  if(item.free) return false;
  return !isPremium();
}
function limitReached(key){
  const item = NAV.find(n=>n.key===key) || MORE_ITEMS.find(n=>n.key===key);
  if(!item || !item.freeLimit || isPremium()) return false;
  const arr = STATE[key] || [];
  return arr.length >= item.freeLimit;
}

/* ============================================================
   RENDER: TOP PULSE ANIMATION (signature element)
   ============================================================ */
let pulseT=0;
function drawPulse(){
  const c=document.getElementById('pulseCanvas'); if(!c) return;
  const dpr=window.devicePixelRatio||1;
  const w=c.parentElement.clientWidth||140, h=26;
  c.width=w*dpr; c.height=h*dpr; c.style.width=w+"px"; c.style.height=h+"px";
  const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff5734';
  ctx.lineWidth=1.6; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath();
  const seg = 12; const amp = h*0.38; const mid=h/2;
  for(let x=0; x<=w; x++){
    const p = (x + pulseT) % (w+seg*6);
    let y = mid;
    const localX = p % (seg*6);
    if(localX>seg*2.2 && localX<seg*2.7) y = mid - amp*1.6;
    else if(localX>=seg*2.7 && localX<seg*3.1) y = mid + amp*1.1;
    else if(localX>=seg*3.1 && localX<seg*3.4) y = mid - amp*0.3;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
  pulseT += 1.4;
  requestAnimationFrame(drawPulse);
}

function computeInsights(){
  const insights = [];
  const t = todayISO();
  // abonnements expirant sous 5 jours
  STATE.members.forEach(m=>{
    if(m.statut!=="actif") return;
    if(!m.abonnementFin) return;
    const d = daysBetween(t, m.abonnementFin);
    if(d<0) insights.push({level:"red", title:`Abonnement expiré — ${m.prenom} ${m.nom}`, sub:`Depuis ${Math.abs(d)} j · ${m.abonnementType}`});
    else if(d<=5) insights.push({level:"amber", title:`Abonnement expire bientôt — ${m.prenom} ${m.nom}`, sub:`Dans ${d} j · ${m.abonnementType}`});
  });
  // paiements en retard
  STATE.paiements.filter(p=>p.statut==="impayé").forEach(p=>{
    const mem = STATE.members.find(m=>m.id===p.memberId);
    insights.push({level:"red", title:`Paiement impayé — ${mem? mem.prenom+" "+mem.nom : "Adhérent"}`, sub:`${fmtFCFA(p.montant)} · ${p.type}`});
  });
  // maintenance équipements
  STATE.equipements.forEach(e=>{
    if(e.garantieFin){ const d=daysBetween(t,e.garantieFin); if(d>=0 && d<=14) insights.push({level:"amber", title:`Garantie bientôt expirée — ${e.nom}`, sub:`Dans ${d} j`}); }
    if(e.etat==="En panne") insights.push({level:"red", title:`Équipement en panne — ${e.nom}`, sub:e.localisation||""});
    if(e.derniereMaintenance){ const d=daysBetween(e.derniereMaintenance,t); if(d>=180) insights.push({level:"amber", title:`Entretien recommandé — ${e.nom}`, sub:`Dernier entretien il y a ${d} j`}); }
  });
  // anniversaires (si date naissance non stockée -> skip); nouveaux membres 24h
  STATE.members.forEach(m=>{
    if(m.dateInscription===t) insights.push({level:"teal", title:`Nouveau membre — ${m.prenom} ${m.nom}`, sub:"Inscrit aujourd'hui"});
  });
  // risque d'abandon (heuristique) : pas de présence depuis 14j et abonnement actif
  STATE.members.forEach(m=>{
    if(m.statut!=="actif") return;
    const last = (m.presence||[]).slice(-1)[0];
    const gap = last? daysBetween(last,t) : daysBetween(m.dateInscription,t);
    if(gap>=14) insights.push({level:"grey", title:`Risque d'abandon — ${m.prenom} ${m.nom}`, sub:`Aucune présence depuis ${gap} j`});
  });
  return insights.sort((a,b)=>{ const order={red:0,amber:1,teal:2,grey:3}; return order[a.level]-order[b.level]; });
}

function computeStats(){
  const t=todayISO();
  const activeMembers = STATE.members.filter(m=>m.statut==="actif").length;
  const presentToday = STATE.members.filter(m=>(m.presence||[]).includes(t)).length;
  const monthStart = t.slice(0,7);
  const revenueMonth = STATE.paiements.filter(p=>p.statut==="payé" && p.date && p.date.slice(0,7)===monthStart).reduce((s,p)=>s+Number(p.montant||0),0);
  const impayes = STATE.paiements.filter(p=>p.statut==="impayé").reduce((s,p)=>s+Number(p.montant||0),0);
  const coachsDispo = STATE.coachs.length;
  const equipEnPanne = STATE.equipements.filter(e=>e.etat==="En panne").length;
  const coursAujourdhui = STATE.planning.filter(p=>p.date===t).length;
  return {activeMembers, presentToday, revenueMonth, impayes, coachsDispo, equipEnPanne, coursAujourdhui};
}

function renderDashboard(){

  })();
  const trendUp = s.revenueMonth >= prevMonthRev;
  let html = `
  <div class="grid2">
    <div class="stat-card"><div class="v">${s.activeMembers}</div><div class="l">Adhérents actifs</div></div>
    <div class="stat-card"><div class="v">${s.presentToday}</div><div class="l">Présents aujourd'hui</div></div>

    <div class="stat-card"><div class="v">${fmtFCFA(s.impayes)}</div><div class="l">Impayés en cours</div></div>

    insights.slice(0,6).map(i=>`<div class="alert-row"><div class="dot ${i.level==='red'?'red':i.level==='amber'?'amber':i.level==='teal'?'teal':'grey'}"></div><div><div class="t">${i.title}</div><div class="s">${i.sub}</div></div></div>`).join("")}

  <button class="btn btn-danger mt2" style="width:100%;" onclick="deleteAllDashboardData()">🗑️ Supprimer toutes les données</button>

  `;

  const locked = moduleLocked(key);
  return `<button class="card" style="text-align:center; cursor:pointer; position:relative;" onclick="navigateGlobal('${key}')">
    <div style="color:var(--accent); margin-bottom:6px;">${icon()}</div>

  </button>`;

function renderRecommendations(){
  const recos=[];
  const t=todayISO();
  // coach le moins chargé
  if(STATE.coachs.length){
    const load = STATE.coachs.map(c=>({c, n:STATE.members.filter(m=>m.coachId===c.id).length})).sort((a,b)=>a.n-b.n)[0];
    recos.push(`Le coach le plus disponible en ce moment est <b>${load.c.prenom} ${load.c.nom}</b> (${load.n} adhérent(s) suivis) — à recommander aux nouveaux inscrits.`);
  }
  // prévision revenus simple (moyenne des paiements payés des 30 derniers jours * facteur)
  const last30 = STATE.paiements.filter(p=>p.statut==="payé" && p.date && daysBetween(p.date,t)<=30 && daysBetween(p.date,t)>=0);
  if(last30.length){
    const avgDaily = last30.reduce((s,p)=>s+Number(p.montant||0),0)/30;
    recos.push(`Prévision : à ce rythme, les recettes du mois prochain pourraient atteindre environ <b>${fmtFCFA(avgDaily*30)}</b>.`);
  }
  // équipement sous-utilisé (placeholder heuristique: aucun log récent)
  const staleEq = STATE.equipements.filter(e=> !e.derniereMaintenance || daysBetween(e.derniereMaintenance,t)>240);
  if(staleEq.length) recos.push(`${staleEq.length} équipement(s) n'ont pas eu d'entretien depuis longtemps — planifiez une maintenance préventive.`);
  if(!recos.length) recos.push("Ajoutez des adhérents et des paiements pour générer des recommandations personnalisées.");
  return `<div class="card">${recos.map(r=>`<div class="small" style="margin-bottom:8px; line-height:1.5;">• ${r}</div>`).join("")}</div>`;
}

}

window.markPresence = function(id){

function objectifBars(){
  const counts={};
  STATE.members.forEach(m=>{ const o=m.objectif||"Non défini"; counts[o]=(counts[o]||0)+1; });
  const total = STATE.members.length||1;

      <div class="progress-bar"><div style="width:${Math.round(v/total*100)}%;"></div></div>
    </div>`).join("") || `<div class="small">Aucune donnée.</div>`;
}
function getCSS(varName){ return getComputedStyle(document.documentElement).getPropertyValue(varName).trim(); }
function drawBarChart(canvasId, labels, values, color){
  const c=document.getElementById(canvasId); if(!c) return;
  const dpr=window.devicePixelRatio||1;
  const w=c.parentElement.clientWidth-28, h=140;
  c.width=w*dpr; c.height=h*dpr; c.style.width=w+"px"; c.style.height=h+"px";
  const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(...values,1);
  const barW = w/values.length*0.55;
  const gap = w/values.length;
  values.forEach((v,i)=>{
    const bh = (v/max)*(h-28);
    const x = gap*i + (gap-barW)/2;
    const y = h-22-bh;
    ctx.fillStyle = color || '#ff5734';
    roundRect(ctx, x, y, barW, bh, 4); ctx.fill();
    ctx.fillStyle = '#8b93a6'; ctx.font='9.5px sans-serif'; ctx.textAlign='center';
    ctx.fillText(labels[i], gap*i+gap/2, h-8);
  });
}
function roundRect(ctx,x,y,w,h,r){
  if(h<=0) h=0.0001;
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

window.activateBySmsFromParams = function(){
  const input = (document.getElementById('paramSmsCode').value||"").trim().toUpperCase();
  if(!input.startsWith("MF-")){ toast("Code invalide"); return; }
  const parts = input.split("-");
  if(parts.length!==4){ toast("Code invalide"); return; }
  const durations = {M1:30, M3:90, AN:365, PP:null};
  const type = parts[1];
  if(!(type in durations)){ toast("Code invalide"); return; }
  const generatedAt = parseInt(parts[2], 36);
  if(!generatedAt || isNaN(generatedAt)){ toast("Code invalide"); return; }
  if(nowTS()-generatedAt > 10*60*1000){ toast("Code expiré (valable 10 minutes après génération)"); return; }
  const used = JSON.parse(localStorage.getItem("mf_used_shared_codes")||"[]");
  if(used.includes(input)){ toast("Ce code a déjà été utilisé sur cet appareil"); return; }
  applyLicense(durations[type]);
  used.push(input);
  localStorage.setItem("mf_used_shared_codes", JSON.stringify(used));
  toast("Licence activée avec succès");
  renderView('parametres');
};

  "BLESS30": {days:30, label:"Premium 30 jours"},
  "BLESS90": {days:90, label:"Premium 90 jours"},
  "BLESS365": {days:365, label:"Premium 365 jours"},
  "BLESSPERM": {days:null, label:"Premium permanent"}
};

let admGenClickCount=0, admGenClickTimer=null;
function openAdminPanel(){
  const lic = STATE.license;
  openSheet(`
    <h3 id="admPanelTitle">Panneau d'administration</h3>
    <div class="small mt">Code appareil : <b>${lic.deviceCode}</b></div>
    <div class="small mt">Statut : <b>${isPremium()? 'Premium actif' : 'Gratuit'}</b></div>

    <div class="section-title"><h2>Activation par mot de passe</h2></div>
    <div class="field"><input id="admPass" placeholder="Mot de passe…" autocapitalize="characters"></div>
    <button class="btn btn-primary" onclick="activateByPassword()">Activer</button>

    <div id="admGenSection" style="display:none;">
      <div class="section-title"><h2>Générer un code partageable (SMS)</h2></div>
      <div class="small">Expire réellement 10 min après génération, utilisable sur n'importe quel téléphone.</div>
      <div class="grid2 mt2">
        <button class="btn btn-ghost" onclick="generateSmsCode(30)">30 jours</button>
        <button class="btn btn-ghost" onclick="generateSmsCode(90)">90 jours</button>
        <button class="btn btn-ghost" onclick="generateSmsCode(365)">365 jours</button>
        <button class="btn btn-ghost" onclick="generateSmsCode('permanent')">Permanent</button>
      </div>
      <div id="smsCodeDisplay" class="small mt2"></div>
    </div>

    <div class="section-title"><h2>Code d'activation SMS</h2></div>
    <div class="small">Saisissez un code reçu par SMS.</div>
    <div class="field mt2"><input id="admSmsInput" placeholder="Saisir le code reçu"></div>
    <button class="btn btn-primary" onclick="activateBySms()">Valider le code</button>

    ${isPremium()? `<button class="btn btn-danger mt2" onclick="revokeLicense()">Révoquer la licence (test)</button>` : ''}
    <button class="btn btn-ghost mt2" onclick="closeSheetGlobal()">Fermer</button>
  `);
  const titleEl = document.getElementById('admPanelTitle');
  if(titleEl){
    titleEl.addEventListener('click', ()=>{
      admGenClickCount++;
      clearTimeout(admGenClickTimer);
      admGenClickTimer=setTimeout(()=>{ admGenClickCount=0; }, 1500);
      if(admGenClickCount>=5){
        admGenClickCount=0; clearTimeout(admGenClickTimer);
        const sec=document.getElementById('admGenSection');
        if(sec) sec.style.display='block';
      }
    });
  }
}
window.activateByPassword = function(){
  const pass = (document.getElementById('admPass').value||"").trim().toUpperCase();
  const conf = BLESS_CODES[pass];
  if(!conf){ toast("Mot de passe invalide"); return; }
  applyLicense(conf.days);
  toast(conf.label+" activé");
  closeSheet(); renderView(CURRENT_VIEW); renderBottomNav();
};
window.generateSmsCode = function(duree){
  const codes = {30:'M1',90:'M3',365:'AN',permanent:'PP'};
  const suffix = codes[duree] || 'XX';
  const ts = nowTS().toString(36).toUpperCase();
  const rnd = Math.random().toString(36).slice(2,8).toUpperCase();
  const code = `MF-${suffix}-${ts}-${rnd}`;
  const el = document.getElementById('smsCodeDisplay');
  if(el) el.innerHTML = `Code généré : <b style="font-size:16px; color:var(--accent);">${code}</b> (valable 10 min) — partageable par SMS.`;
};
window.activateBySms = function(){
  const input = (document.getElementById('admSmsInput').value||"").trim().toUpperCase();
  if(!input.startsWith("MF-")){ toast("Code invalide"); return; }
  const parts = input.split("-");
  if(parts.length!==4){ toast("Code invalide"); return; }
  const durations = {M1:30, M3:90, AN:365, PP:null};
  const type = parts[1];
  if(!(type in durations)){ toast("Code invalide"); return; }
  const generatedAt = parseInt(parts[2], 36);
  if(!generatedAt || isNaN(generatedAt)){ toast("Code invalide"); return; }
  if(nowTS()-generatedAt > 10*60*1000){ toast("Code expiré (valable 10 minutes après génération)"); return; }
  const used = JSON.parse(localStorage.getItem("mf_used_shared_codes")||"[]");
  if(used.includes(input)){ toast("Ce code a déjà été utilisé sur cet appareil"); return; }
  applyLicense(durations[type]);
  used.push(input);
  localStorage.setItem("mf_used_shared_codes", JSON.stringify(used));
  toast("Licence activée avec succès");
  closeSheet(); renderView(CURRENT_VIEW); renderBottomNav();
};
function applyLicense(days){
  if(!clockGuardOK()){ toast("Horloge système suspecte — activation refusée"); return; }
  STATE.license.status="premium";
  STATE.license.activatedAt = nowTS();
  STATE.license.expiresAt = days===null? null : nowTS()+days*86400000;
  STATE.license.plan = days===null? "permanent" : days+" jours";
  saveState();
}
window.revokeLicense = function(){ STATE.license.status="free"; STATE.license.expiresAt=null; saveState(); closeSheet(); toast("Licence révoquée"); renderView(CURRENT_VIEW); renderBottomNav(); };

/* ============================================================
   PIN LOCK LOGIC
   ============================================================ */
let pinBuffer="";
let pinMode="unlock"; // unlock | setup1 | setup2
let pinFirstEntry="";
function renderPinPad(){
  const pad = document.getElementById('pinPad'); pad.innerHTML="";
  const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
  keys.forEach(k=>{
    const b=document.createElement('button');
    if(k===""){ b.style.visibility='hidden'; b.className='pin-key'; pad.appendChild(b); return; }
    b.className='pin-key'; b.textContent=k;
    b.onclick=()=> handlePinKey(k);
    pad.appendChild(b);
  });
}
function updatePinDots(){
  const dots=document.getElementById('pinDots'); dots.innerHTML="";
  for(let i=0;i<4;i++){ const d=document.createElement('div'); d.className='pin-dot'+(i<pinBuffer.length?' filled':''); dots.appendChild(d); }
}
function handlePinKey(k){
  if(k==='⌫'){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); return; }
  if(pinBuffer.length>=4) return;
  pinBuffer+=k; updatePinDots();
  if(pinBuffer.length===4){ setTimeout(processPinEntry,150); }
}
function processPinEntry(){
  if(pinMode==='unlock'){
    if(pinBuffer===STATE.settings.pin){ hidePinScreen(); }
    else{ toast("Code incorrect"); pinBuffer=""; updatePinDots(); }
  } else if(pinMode==='setup1'){
    pinFirstEntry=pinBuffer; pinBuffer=""; updatePinDots();
    document.getElementById('pinLabel').textContent="Confirmez le nouveau code";
    pinMode='setup2';
  } else if(pinMode==='setup2'){
    if(pinBuffer===pinFirstEntry){
      STATE.settings.pin=pinBuffer; STATE.settings.pinEnabled=true; saveState();
      toast("Code PIN activé"); hidePinScreen(); renderView('parametres');
    } else {
      toast("Les codes ne correspondent pas"); pinBuffer=""; pinFirstEntry=""; updatePinDots();
      document.getElementById('pinLabel').textContent="Entrez le nouveau code";
      pinMode='setup1';
    }
  }
}
function showPinScreen(mode){
  pinMode=mode||'unlock'; pinBuffer=""; pinFirstEntry="";
  document.getElementById('pinLabel').textContent = pinMode==='unlock'? "Entrez le code PIN" : "Entrez le nouveau code";
  updatePinDots(); renderPinPad();
  document.getElementById('pinScreen').classList.add('show');
}
function hidePinScreen(){ document.getElementById('pinScreen').classList.remove('show'); }
function startPinSetup(){ showPinScreen('setup1'); }
document.getElementById('pinForgot').onclick = ()=>{
  toast("Réinitialisation : contactez l'administrateur de la salle");
};

/* ============================================================
   INIT
   ============================================================ */
function init(){
  seedIfEmpty();
  renderBottomNav();
  navigate('dashboard');
  drawPulse();
  refreshNotifBadge();
  setInterval(refreshNotifBadge, 30000);
  if(STATE.settings.pinEnabled){ showPinScreen('unlock'); }
  STATE.settings.lastOpenTS = nowTS();
  clockGuardOK();
  saveState();
}
init();

})();
